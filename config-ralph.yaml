# == Basic loop configuration ==
run-name: testing-refactor
max-iter: 20

# Optional pre-loop baseline test run
test-before-loop: off

# == Test Set ==
test-mode: selected

selected-tests:
  - spec-compliance
  - theory-correctness

# Agent log verbosity
agent-log-mode: verbose

# == Referee reviews and continual-improvement mode ==

continual-improvement: true

reviews: true

selected-reviews:
  - referee-top3
