# == Basic loop configuration ==
# Internal-use note for this Ralph stretch; not included in iteration commit subjects.
run-note: rm writing-flow, fix theory-clarity, add unmodeled-channels + writing-intro
max-iter: 20

# Optional pre-loop baseline test run
test-before-loop: off

# == Test Set ==
test-mode: selected

selected-tests:
  - element-gkp-cites
  - element-lit-review
  - element-opening-fig
  - element-rhetoric-meta
  - element-transfers-fig
  - factcheck-anaphora
  - factcheck-bysection
  - factcheck-code
  - factcheck-exhibits
  - factcheck-freely
  - factcheck-lit
  - factcheck-narrative
  - factcheck-theory
  - spec-economic
  - spec-paper
  - spec-scope
  - theory-clarity  
  - theory-deadweight
  - theory-intro-payoff  
  - theory-unmodeled-channels
  - visual-figures
  - visual-figures-image-only
  - visual-pages
  - writing-intro  
  - writing-intuition


# Agent log verbosity
agent-log-mode: verbose

# Stop before batch test runs when Claude's observed five-hour utilization is too high
quota-preflight: on
claude-5h-utilization-limit: 0.67

# == Referees and continual-improvement mode ==
continual-improvement: false

referees: false

selected-referees:
  - []
