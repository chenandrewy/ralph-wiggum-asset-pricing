# == Basic loop configuration ==
run-name: gkp-checks+wrds-fix
max-iter: 10

# Optional pre-loop baseline test run
test-before-loop: off

# == Test Set ==
test-mode: selected

selected-tests:
  - factcheck-anaphora
  - factcheck-bysection
  - factcheck-code
  - factcheck-lit
  - factcheck-theory
  - quality-formalism
  - quality-gkp-cites
  - spec-economic
  - spec-paper
  - visual-figures
  - visual-pages

# Agent log verbosity
agent-log-mode: verbose

# == Referees and continual-improvement mode ==

continual-improvement: true

referees: true

selected-referees:
  - referee-cfr-r1
