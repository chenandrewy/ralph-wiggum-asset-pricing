# == Basic loop configuration ==
run-name: testing-refactor
max-iter: 20

# Optional pre-loop baseline test run
test-before-loop: off

# == Test Set ==
test-mode: selected

selected-tests:
  - factcheck-code
  - factcheck-interpretation
  - factcheck-lit
  - spec-compliance
  - factcheck-theory
  - visual-pages

# Agent log verbosity
agent-log-mode: verbose

# == Referees and continual-improvement mode ==

continual-improvement: true

referees: true

selected-referees:
  - referee-cfr-r1
