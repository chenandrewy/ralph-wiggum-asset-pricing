# == Basic loop configuration ==
run-name: lots-of-tests-now
max-iter: 30

# Optional pre-loop baseline test run
test-before-loop: on

# == Test Set ==
test-mode: selected

selected-tests:
  - factcheck-anaphora
  - factcheck-bysection
  - factcheck-code
  - factcheck-lit
  - factcheck-theory
  - factcheck-exhibits
  - factcheck-narrative
  - factcheck-freely
  - quality-formalism
  - quality-gkp-cites
  - spec-economic
  - spec-paper
  - visual-figures
  - visual-pages

# Agent log verbosity
agent-log-mode: verbose

# == Referees and continual-improvement mode ==

continual-improvement: true

referees: true

selected-referees:
  - referee-cfr-r1
