# == Basic loop configuration ==
run-name: ref-cfr+factcheck
max-iter: 10

# Optional pre-loop baseline test run
test-before-loop: off

# == Test Set ==
test-mode: selected

selected-tests:
  - factcheck-code
  - factcheck-theory
  - factcheck-interpretation
  - factcheck-lit
  - spec-compliance
  - visual-figures
  - visual-pages

# Agent log verbosity
agent-log-mode: verbose

# == Referees and continual-improvement mode ==

continual-improvement: true

referees: true

selected-referees:
  - referee-cfr-r1
