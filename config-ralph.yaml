# == Basic loop configuration ==
# Internal-use note for this Ralph stretch; not included in iteration commit subjects.
run-note: revamp check-direction
startup-source: ralph/research-template/
max-iter: 5

# Optional pre-loop baseline test run
test-before-loop: off

# == Test Set ==
test-mode: selected

selected-tests:
  - factcheck-code
  - factcheck-freely
  - factcheck-lit
  - spec-paper
  - visual-figures
  - visual-figures-image-only

# Agent log verbosity
agent-log-mode: verbose

# Stop before tests if Claude's budget is low
quota-preflight: false
claude-5h-utilization-limit: 0.67

# == Referees and continual-improvement mode ==
continual-improvement: true

referees: true

selected-referees:
  - referee-top3
