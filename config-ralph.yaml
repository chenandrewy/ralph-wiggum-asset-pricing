# == Basic loop configuration ==
# Internal-use note for this Ralph stretch; not included in iteration commit subjects.
run-note: ext-spec-refined-3
max-iter: 30

# Optional pre-loop baseline test run
test-before-loop: off

# == Test Set ==
test-mode: selected

selected-tests:
  - element-gkp-cites
  - element-lit-review
  - element-opening-fig
  - element-rhetoric-meta
  - element-transfers-fig
  - factcheck-anaphora
  - factcheck-bysection
  - factcheck-code
  - factcheck-exhibits
  - factcheck-freely
  - factcheck-lit
  - factcheck-narrative
  - factcheck-theory
  - spec-economic
  - spec-paper
  - spec-scope
  - theory-deadweight
  - theory-clarity
  - visual-figures
  - visual-figures-image-only
  - visual-pages
  - writing-econ-messaging
  - writing-flow
  - theory-intro-payoff
  - writing-intuition

# Agent log verbosity
agent-log-mode: verbose

# Stop before batch test runs when Claude's observed five-hour utilization is too high
quota-preflight: on
claude-5h-utilization-limit: 0.67

# == Referees and continual-improvement mode ==
continual-improvement: false

referees: false

selected-referees:
  - []
