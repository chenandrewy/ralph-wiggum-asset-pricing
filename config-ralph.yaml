# == Basic loop configuration ==
# Internal-use note for this Ralph stretch; not included in iteration commit subjects.
run-note: revamp check-direction
startup-source: ralph-garage/check-direction/run-01
max-iter: 20

# Optional pre-loop baseline test run
test-before-loop: on

# == Test Set ==
test-mode: selected

selected-tests:
  - element-gkp-cites
  - element-lit-review
  - element-opening-fig
  - element-rhetoric-meta
  - element-transfers-fig
  - factcheck-anaphora
  - factcheck-bysection
  - factcheck-code
  - factcheck-exhibits
  - factcheck-freely
  - factcheck-lit
  - factcheck-narrative
  - factcheck-theory
  - spec-economic
  - spec-paper
  - spec-scope
  - theory-clarity
  - theory-deadweight
  - theory-intro-payoff
  - theory-unmodeled-channels
  - visual-figures
  - visual-figures-image-only
  - visual-pages
  - writing-intro
  - writing-intuition

# Agent log verbosity
agent-log-mode: verbose

# Stop before tests if Claude's budget is low
quota-preflight: false
claude-5h-utilization-limit: 0.67

# == Referees and continual-improvement mode ==
continual-improvement: false

referees: false

selected-referees:
  - []
